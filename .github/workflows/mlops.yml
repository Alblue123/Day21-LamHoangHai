name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  # JOB 1: Unit Test
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v

  # JOB 2: Train & Upload
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CLOUD_CREDENTIALS }}
      - name: Pull data with DVC
        run: dvc pull
      - name: Train model
        run: python src/train.py
      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
      - name: Upload model to GCS (Latest)
        # Chúng ta upload luôn ở đây vì đã có sẵn file và quyền
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          bucket_name = os.environ.get("CLOUD_BUCKET")
          storage_client = storage.Client()
          bucket = storage_client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print(f"Model uploaded to gs://{bucket_name}/models/latest/model.pkl")
          EOF
      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Eval Gate
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check accuracy threshold
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.65:
              print(f"FAILED: Accuracy {acc:.4f} < 0.65. Ngung trien khai.")
              exit(1)
          print(f"PASSED: Accuracy {acc:.4f} >= 0.65. Tiep tuc trien khai.")
          EOF

  # JOB 4: Deploy
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy code to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py"
          target: "/home/${{ secrets.VM_USER }}/"
      - name: SSH and Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 15
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
