name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  # JOB 1: Unit Test
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/ -v

  # JOB 2: Train & Upload
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CLOUD_CREDENTIALS }}
      - name: Pull data with DVC
        run: dvc pull
      - name: Train model
        run: python src/train.py
      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
      - name: Upload model to GCS (Latest)
        # Chúng ta upload luôn ở đây vì đã có sẵn file và quyền
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          bucket_name = os.environ.get("CLOUD_BUCKET")
          storage_client = storage.Client()
          bucket = storage_client.bucket(bucket_name)
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          
          # Upload metrics for comparison in next runs (Bonus 4)
          blob_metrics = bucket.blob("metadata/latest_metrics.json")
          blob_metrics.upload_from_filename("outputs/metrics.json")
          
          print(f"Model and metrics uploaded to gs://{bucket_name}")
          EOF
      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt

  # JOB 3: Eval Gate
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CLOUD_CREDENTIALS }}
      - name: Download previous metrics
        continue-on-error: true
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          gcloud storage cp gs://${CLOUD_BUCKET}/metadata/latest_metrics.json old_metrics.json || echo "No previous metrics found."
      - name: Check accuracy threshold and comparison
        run: |
          python - <<'EOF'
          import json
          import os
          
          new_acc = float("${{ needs.train.outputs.accuracy }}")
          
          # 1. Check absolute threshold (existing logic)
          if new_acc < 0.65:
              print(f"FAILED: Accuracy {new_acc:.4f} < 0.65. Ngung trien khai.")
              exit(1)
          
          # 2. Compare with old accuracy (Bonus 4)
          if os.path.exists("old_metrics.json"):
              with open("old_metrics.json", "r") as f:
                  old_data = json.load(f)
                  old_acc = float(old_data.get("accuracy", 0))
              
              print(f"Old Accuracy: {old_acc:.4f} | New Accuracy: {new_acc:.4f}")
              if new_acc < old_acc:
                  print(f"FAILED: Mo hinh moi ({new_acc:.4f}) kem hon mo hinh cu ({old_acc:.4f}). Huy deploy.")
                  exit(1)
              else:
                  print("PASSED: Mo hinh moi tot bang hoac hon mo hinh cu.")
          else:
              print("No previous metrics found. First time deploy.")
          
          print(f"SUCCESS: Accuracy {new_acc:.4f} thoa man moi dieu kien.")
          EOF

  # JOB 4: Deploy
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy code to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py"
          target: "/home/${{ secrets.VM_USER }}/"
      - name: SSH and Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 15
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1
