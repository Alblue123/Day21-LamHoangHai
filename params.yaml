# Loai mo hinh su dung (random_forest, gradient_boosting, logistic_regression)
model_type: "random_forest"

# Tham so cho RandomForestClassifier
random_forest:
  n_estimators: 100
  max_depth: 50
  min_samples_split: 3

# Tham so cho GradientBoostingClassifier
gradient_boosting:
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 3

# Tham so cho LogisticRegression
logistic_regression:
  C: 1.0
  max_iter: 1000
